<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Forest Critters</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <div id="character-select">
      <h1>🌲 Forest Critters 🌲</h1>
      <p>Choose your critter:</p>
      <div id="char-options">
        <button class="char-btn" data-char="turtle">
          <div class="char-preview turtle-preview"></div>
          <span>Turtle</span>
        </button>
        <button class="char-btn" data-char="sloth">
          <div class="char-preview sloth-preview"></div>
          <span>Sloth</span>
        </button>
      </div>
      <label id="dev-mode-label"><input type="checkbox" id="dev-mode"> Dev Mode (start with 50 wood)</label>
      <div id="save-buttons"></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <button id="new-game-btn">🔄 New Game</button>
    <div id="hud"></div>
    <div id="hud-hint-bar">[W] Move  [I] Inventory  [C] Craft  Click: Interact  [Q] Eat</div>
    <div id="inventory-screen" class="hidden"></div>
    <div id="craft-menu" class="hidden"></div>
    <div id="faint-overlay" class="hidden">
      <div class="faint-msg">You fainted! Resting...</div>
    </div>
    <div id="touch-controls">
      <div id="joystick-zone">
        <div id="joystick-base">
          <div id="joystick-thumb"></div>
        </div>
      </div>
      <div class="touch-btn" id="btn-interact">👆</div>
      <div class="touch-btn" id="btn-eat">🍗</div>
      <div class="touch-btn" id="btn-inventory">🎒</div>
      <div class="touch-btn" id="btn-craft">🔨</div>
    </div>
  </div>
  <script src="js/entities.js"></script>
  <script src="js/player.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
